# Paridad de Recursos (Spring Boot + Firebase Hosting)
spring.web.resources.static-locations=classpath:/static/,classpath:/templates/

# Aumentar buffer para templates grandes
spring.thymeleaf.template-resolver-order=1
spring.thymeleaf.cache=false
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# Aumentar tamaño de respuesta HTTP
server.tomcat.max-http-response-header-size=65536
server.max-http-request-header-size=65536

# Aumentar buffer de escritura de Thymeleaf  
spring.thymeleaf.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Database Configuration (Personalized for Orbita)
spring.datasource.url=jdbc:h2:file:./data/orbita_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.clinica.ctc=DEBUG

# Timeout para respuestas lentas
spring.mvc.async.request-timeout=-1
