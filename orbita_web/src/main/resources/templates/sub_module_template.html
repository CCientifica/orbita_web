<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header('Módulo')}"></head>
<body class="dashboard-layout fade-in">
    <!-- Sidebar from Layout -->
    <aside th:replace="~{layout :: sidebar}"></aside>

    <div class="content-wrapper">
        <!-- Navbar from Layout -->
        <nav th:replace="~{layout :: navbar('Módulo')}"></nav>

        <main class="main-content">
            <header class="dashboard-header fade-in">
                <h1 id="pageTitle">Módulo</h1>
                <p>Interfaz estandarizada de Orbita Clínica para gestión técnica.</p>
            </header>

            <div class="dashboard-grid fade-in">
                <div class="prof-card" style="grid-column: span 12; padding: 4rem; text-align: center;">
                    <div class="prof-card-icon" style="font-size: 4rem; margin-bottom: 2rem; margin-left: auto; margin-right: auto;">⚙️</div>
                    <h2 id="cardTitle" style="color: #1e293b; margin-bottom: 1rem;">Módulo en Construcción</h2>
                    <p style="max-width: 600px; margin: 0 auto 2rem; color: #64748b;">Esta sección del ecosistema Orbita Clínica está siendo migrada a los nuevos estándares profesionales. La integración de datos estará disponible próximamente.</p>
                    <a href="/home" class="btn-icon" style="width: auto; padding: 0 1.5rem; gap: 0.5rem; text-decoration: none; color: #3b82f6; border-color: #3b82f6;">
                        <i data-lucide="layout-dashboard"></i>
                        <span>Volver al Panel Principal</span>
                    </a>
                </div>
            </div>
        </main>

        <!-- Footer from Layout -->
        <footer th:replace="~{layout :: footer}"></footer>
    </div>

    <!-- Scripts from Layout -->
    <div th:replace="~{layout :: scripts}"></div>

    <script type="module">
        // Auto-naming logic based on URL for submodules
        const path = window.location.pathname.substring(1);
        const name = path.replace(/-/g, ' ').replace(/_/g, ' ').toUpperCase();
        if(name) {
            document.title = `${name} — Orbita Clínica`;
            const titleEl = document.getElementById('pageTitle');
            const cardTitleEl = document.getElementById('cardTitle');
            if(titleEl) titleEl.textContent = name;
            if(cardTitleEl) cardTitleEl.textContent = `Módulo ${name}`;
        }
    </script>
</body>
</html>
